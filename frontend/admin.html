<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="./admin.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/" class="logo">
                WatchIQ
            </a>
            
            <nav class="navigation">
                <a href="accueil.html">Accueil</a>
                <a href="catalogue.html">Catalogue</a>
                <a href="versus.html">Versus</a>
                <a href="admin.html">Administration</a>
            </nav>
            
            <nav class="navigation-right">
                <a class=btn-fill href ="#">Connexion</a>
                <a class=btn-fill href="#">S'inscrire</a>
            </nav>
        </header>
        
        <div>
            <div class ="head">espace d'administration</div>
            <div class="slogan"> Gérer le catalogue</div>


            <div class="inventaire">
                <div class="box">
                    <div class="gold" id="stat-count">—</div>
                    <div>MONTRES AU CATALOGUE</div>
                </div>
                <div class="box">
                    <div class="gold" id="stat-brands">—</div>
                    <div>MARQUES</div>
                </div>
                <div class="box">
                    <div class="gold" id="stat-available">—</div>
                    <div>DISPONIBLES</div>
                </div>
            </div>

        </div>

        <div class="admin">

            <div class="form">
                <form id="create-form">
                    <div class="form-watch">
                        <label for="brandinput">Marque</label>
                        <input class="input-form" type="text" name="Marque" id="brandinput">
                    </div>

                    <div class="form-watch">
                        <label for="modelinput">Modele</label>
                        <input class="input-form"  type="text" name="Modele" id="modelinput">
                    </div>

                    <div class="form-watch">
                        <label for="Refinput">Reference</label>
                        <input  class="input-form" type="text" name="Reference" id="Refinput">
                    </div>

                    <div class="form-double">
                        <div>
                                <label for="prixinput">Prix</label>
                                <input class="input-form" type="number" name="prix" id="prixinput">
                        </div>

                        <div>
                                <label for="diametre-input">Diamétre</label>
                                <input class="input-form" type="number" name="diametre" id="diametre-input">
                        </div>

                    </div>

                    <div class="form-double">
                        <div>
                                <label for="categoryinput">Categorie</label>
                                <input class="input-form" type="text" name="categorie" id="categoryinput"> 
                        </div>

                        <div>
                                <label for="mvtinput">Mouvement</label>
                                <input class="input-form" type="text" name="mouvement" id="mvtinput"> 
                        </div>

                    </div>

                    <div class="form-watch">
                        <label for="description-input">Description</label>
                        <input class="input-form" type="text" name="Desription" id="description-input"> 
                    </div>

                    <div>
                        <button id="create-btn"  class="btn-fill">AJOUTER LA MONTRE</button>
                    </div>

                    <!-- message de retour (succès / erreur) rempli par admin.js -->
                    <p id="form-message"></p>


                </form>

            </div>

            <div class="admin-panel">
                <input class="input-form" type="text" id="admin-search"
                       placeholder="Filtrer par marque ou modèle…">

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                          <tr>
                            <th>Montre</th>
                            <th>Référence</th>
                            <th>Prix</th>
                            <th></th>
                          </tr>
                        </thead>
                        <!-- Les lignes sont ajoutées dynamiquement par admin.js -->
                        <tbody id="admin-tbody"></tbody>
                    </table>
                </div>
            </div>
             

        </div>
    </div>

    <!-- Fenêtre de confirmation, centrée et cachée par défaut (pilotée par admin.js) -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <p class="modal-text" id="confirm-text">Confirmer ?</p>
            <div class="modal-actions">
                <button class="btn-ghost" id="confirm-cancel">Annuler</button>
                <button class="btn-fill" id="confirm-ok">Supprimer</button>
            </div>
        </div>
    </div>

</body>
</html>
